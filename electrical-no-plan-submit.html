<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Submit Electrical Project | TradeFlow</title>
  <link rel="icon" href="./favicon.png"/>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white">

<header class="border-b border-white/10 p-4">
  <a href="index.html">
    <img src="logo.png" class="h-12">
  </a>
</header>

<section class="text-center px-6 pt-20 pb-12">

  <h1 class="text-4xl font-bold text-[#88D856]">
    Submit Project Details
  </h1>

  <p class="mt-6 max-w-2xl mx-auto text-[#D9D9D9]">
    Payment received. Provide your project details below so we can generate your proposal.
  </p>

  <div class="mt-6 max-w-2xl mx-auto bg-white/5 border border-white/10 rounded-xl p-5">
    <p class="text-[#88D856] font-semibold">Confidentiality Note</p>
    <p class="text-sm mt-2 text-[#D9D9D9]">
      You may use placeholders for client names (e.g., “Client A”, “Project Alpha”).
    </p>
  </div>

</section>

<div class="h-px w-full bg-gradient-to-r from-transparent via-[#0097B2]/60 to-transparent"></div>

<section class="px-6 py-16 text-center">

  <h2 class="text-2xl font-bold">Electrical Project Intake</h2>

  <div class="mt-10 max-w-4xl mx-auto border border-[#0097B2] rounded-xl p-1">
    
    <div style="width:100%;height:500px;"
      data-fillout-id="https://foundationai.fillout.com/t/em1vkHxZyMus"
      data-fillout-embed-type="standard"
      data-fillout-inherit-parameters
      data-fillout-dynamic-resize>
    </div>

  </div>

</section>

<footer class="text-center text-sm text-[#D9D9D9] py-6 border-t border-white/10">
  © 2026 TradeFlow AI Systems™
</footer>

<script src="https://server.fillout.com/embed/v1/"></script>

</body>
</html>
